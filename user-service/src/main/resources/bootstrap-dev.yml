# dev 环境：连 Nacos 配置中心
# Spring Boot 自动加载此文件（当 bootstrap.yml 中 active=dev 时）

spring:
  cloud:
    nacos:
      server-addr: 101.43.103.32:8848
      # 服务发现（注册中心）
      discovery:
        namespace: a4444b64-9f98-4af6-882c-c3d265af4987
      # 配置中心
      config:
        namespace: a4444b64-9f98-4af6-882c-c3d265af4987
        file-extension: yaml

  # 从 Nacos 导入配置：自动查找 user-service-dev.yaml
  config:
    import: optional:nacos:${spring.application.name}-${spring.profiles.active}
