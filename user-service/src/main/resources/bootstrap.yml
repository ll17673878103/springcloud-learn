# bootstrap.yml - 公共配置
#
# 环境切换方式（任选其一）：
#   1. 修改下方 active 的值：dev / pro
#   2. JVM 参数：-Dspring.profiles.active=dev
#   3. 环境变量：SPRING_PROFILES_ACTIVE=dev
#
#   dev → 加载 bootstrap-dev.yml（连 Nacos，拉取 user-service-dev.yaml）
#   pro → 加载 bootstrap-pro.yml（连 Nacos，拉取 user-service-pro.yaml）

spring:
  application:
    name: user-service

  profiles:
    active: dev
